<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body { margin: 0; overflow: hidden; }
    #start-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    #start-overlay p {
      font-size: 1.1rem;
      max-width: 280px;
      line-height: 1.6;
      margin: 0;
    }
    #start-overlay button {
      margin-top: 2rem;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <p>Aponte a câmara para a imagem marcadora para ver a experiência de realidade aumentada.</p>
    <button id="start-btn">Toque para começar</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="v0" src="./Login.mp4"      loop muted playsinline webkit-playsinline preload="auto"></video>
      <video id="v1" src="./Agua.mp4"       loop muted playsinline webkit-playsinline preload="auto"></video>
      <video id="v2" src="./Energia.mp4"    loop muted playsinline webkit-playsinline preload="auto"></video>
      <video id="v3" src="./Mobilidade.mp4" loop muted playsinline webkit-playsinline preload="auto"></video>
      <video id="v4" src="./Residuos.mp4"   loop muted playsinline webkit-playsinline preload="auto"></video>
      <video id="v5" src="./Sobreapp.mp4"   loop muted playsinline webkit-playsinline preload="auto"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#v0" position="0 0 0" width="1" height="1"></a-video>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1">
      <a-video src="#v1" position="0 0 0" width="1" height="1"></a-video>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2">
      <a-video src="#v2" position="0 0 0" width="1" height="1"></a-video>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 3">
      <a-video src="#v3" position="0 0 0" width="1" height="1"></a-video>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 4">
      <a-video src="#v4" position="0 0 0" width="1" height="1"></a-video>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 5">
      <a-video src="#v5" position="0 0 0" width="1" height="1"></a-video>
    </a-entity>

  </a-scene>

  <script>
    document.getElementById('start-btn').addEventListener('click', function () {
      ['v0','v1','v2','v3','v4','v5'].forEach(function(id) {
        var vid = document.getElementById(id);
        vid.play().catch(function(e) { console.warn('play() failed for ' + id + ':', e); });
        vid.pause();
      });
      document.getElementById('start-overlay').style.display = 'none';
    });
  </script>

</body>
</html>
