<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body { margin: 0; overflow: hidden; }
    #start-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    #start-overlay p { font-size: 1.1rem; max-width: 280px; line-height: 1.6; }
    #start-overlay button {
      margin-top: 2rem;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="start-overlay">
    <div class="spinner" id="spinner"></div>
    <p id="overlay-text" style="opacity:0.6;">A carregar...</p>
    <button id="start-btn" style="display:none;">Toque para come&#231;ar</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="myvideo" src="./Login.mp4"
        loop muted playsinline webkit-playsinline preload="auto">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video
        src="#myvideo"
        position="0 0 0"
        width="1" height="1">
      </a-video>
    </a-entity>

  </a-scene>

  <script>
    var sceneEl = document.querySelector("a-scene");
    var spinner = document.getElementById("spinner");
    var overlayText = document.getElementById("overlay-text");
    var startBtn = document.getElementById("start-btn");

    // Once A-Frame is ready, hide spinner and show button
    sceneEl.addEventListener("loaded", function () {
      spinner.style.display = "none";
      overlayText.textContent = "Aponte a c\u00e2mara para o marcador para ver a experi\u00eancia.";
      overlayText.style.opacity = "1";
      startBtn.style.display = "inline-block";
    });

    startBtn.addEventListener("click", function () {
      var vid = document.getElementById("myvideo");
      vid.play().catch(function(e) { console.warn("play() failed:", e); });
      document.getElementById("start-overlay").style.display = "none";
    });
  </script>

</body>
</html>
